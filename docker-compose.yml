# ResearchPulse — Docker Compose
# Run: docker compose up
# Services: PostgreSQL, Redis, Qdrant

services:
  # -----------------------------------------------------------------------
  # PostgreSQL — structured data storage
  # -----------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: researchpulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: researchpulse
      POSTGRES_USER: researchpulse
      POSTGRES_PASSWORD: researchpulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U researchpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------------
  # Redis — task queue backend for Celery
  # -----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: researchpulse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------------
  # Qdrant — vector database for embeddings and similarity search
  # -----------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: researchpulse-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
